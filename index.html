<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hệ thống Quản lý Điểm Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --s: #10b981; --bg: #020617; --card: #0f172a; --text: #f8fafc; --muted: #64748b; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); margin: 0; height: 100vh; overflow: hidden; display: flex; justify-content: center; }
        .shell { width: 100%; max-width: 500px; background: var(--bg); display: flex; flex-direction: column; height: 100%; position: relative; border-left: 1px solid #1e293b; border-right: 1px solid #1e293b; }
        header { padding: 20px; background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 18px; font-weight: 900; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .view { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; display: none; }
        .view.active { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); border-radius: 20px; padding: 18px; margin-bottom: 15px; border: 1px solid #1e293b; }
        .card-h { font-size: 11px; color: var(--p); font-weight: 800; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        input[type="number"] { width: 70px; padding: 8px; background: #000; border: 1px solid #334155; border-radius: 10px; color: #fff; text-align: center; }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--p), #4338ca); color: #fff; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }
        
        /* Cấu trúc mục Cài đặt */
        .set-item { display: flex; align-items: center; gap: 15px; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .set-label { font-size: 14px; font-weight: 600; }
        .set-sub { font-size: 11px; color: var(--muted); }

        /* Vùng nạp file đã sửa lỗi */
        .ota-zone { border: 2px dashed #334155; border-radius: 15px; padding: 35px; text-align: center; background: rgba(0,0,0,0.3); cursor: pointer; transition: 0.3s; }
        .ota-zone:active { background: rgba(99, 102, 241, 0.1); border-color: var(--p); }
        .p-ui { display: none; margin-top: 20px; }
        .bar { width: 100%; height: 6px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .fill { width: 0%; height: 100%; background: var(--s); box-shadow: 0 0 10px var(--s); }

        nav { position: absolute; bottom: 0; width: 100%; height: 75px; background: #020617; border-top: 1px solid #1e293b; display: flex; }
        .nav-it { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); font-size: 10px; font-weight: 700; gap: 5px; cursor: pointer; }
        .nav-it.active { color: var(--p); }
    </style>
</head>
<body>

<div class="shell">
    <header>
        <div class="title" id="appTitle">Hệ thống Quản lý Điểm</div>
        <div id="sysStatus" style="font-size: 9px; color: var(--s); font-weight: 800;">● v2511.1 ACTIVE</div>
    </header>

    <div class="view active" id="v-home">
        <div class="card">
            <div class="card-h"><i class="fa-solid fa-star"></i> Điểm học bạ (TT22)</div>
            <div class="row"><label>Toán học</label><input type="number" class="sc" step="0.1"></div>
            <div class="row"><label>Ngữ văn</label><input type="number" class="sc" step="0.1"></div>
            <div class="row"><label>Ngoại ngữ</label><input type="number" class="sc" step="0.1"></div>
            </div>
        <button class="btn" onclick="alert('Vui lòng cập nhật v2617.3 để dùng tính năng phân tích!')">PHÂN TÍCH KẾT QUẢ</button>
    </div>

    <div class="view" id="v-set">
        <div class="card">
            <div class="card-h">Cấu hình</div>
            <div class="set-item" onclick="tab('v-ota')">
                <i class="fa-solid fa-cloud-arrow-up" style="color: var(--s); width: 20px;"></i>
                <div class="set-info">
                    <div class="set-label">Cập nhật OTA</div>
                    <div class="set-sub">Nhấn để nâng cấp lên v2617.3</div>
                </div>
            </div>
        </div>
    </div>

    <div class="view" id="v-ota">
        <div class="card">
            <div class="ota-zone" id="dropZone">
                <i class="fa-solid fa-file-import" id="otaIcon" style="font-size: 30px; color: #334155; margin-bottom: 10px;"></i>
                <div id="otaMsg" style="font-size: 12px; font-weight: 700;">CHẠM VÀO ĐÂY ĐỂ CHỌN FILE</div>
                <input type="file" id="realInput" style="display: none;">
            </div>
            
            <div id="otaLog" style="display:none; margin-top:15px; font-size:10px; border-left: 2px solid var(--s); padding-left: 10px; color: #94a3b8;">
                <b style="color:var(--s)">BẢN VÁ v2617.3 ĐÃ SẴN SÀNG</b>
            </div>

            <div class="p-ui" id="pUi">
                <div style="display:flex; justify-content:space-between; font-size:9px; font-weight:900; color:var(--s)">
                    <span>ĐANG NẠP KERNEL...</span>
                    <span id="pPct">0%</span>
                </div>
                <div class="bar"><div class="fill" id="pBar"></div></div>
            </div>
            <button class="btn" id="btnRun" style="margin-top:15px; display:none;" onclick="startFlash()">XÁC NHẬN NÂNG CẤP</button>
        </div>
    </div>

    <nav>
        <div class="nav-it active" onclick="tab('v-home', this)"><i class="fa-solid fa-house"></i><span>Trang chủ</span></div>
        <div class="nav-it" onclick="tab('v-set', this)"><i class="fa-solid fa-gear"></i><span>Cài đặt</span></div>
    </nav>
</div>

<script>
    // Hàm chuyển Tab
    function tab(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-it').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }
    }

    // SỬA LỖI NÚT NHẤN: Ép mở trình chọn file
    const dropZone = document.getElementById('dropZone');
    const realInput = document.getElementById('realInput');

    dropZone.addEventListener('click', () => {
        realInput.click(); // Ép kích hoạt sự kiện chọn tệp
    });

    realInput.onchange = function(e) {
        if(e.target.files.length > 0) {
            document.getElementById('otaIcon').style.color = "#10b981";
            document.getElementById('otaMsg').innerText = "Tệp: " + e.target.files[0].name;
            document.getElementById('otaLog').style.display = 'block';
            document.getElementById('btnRun').style.display = 'block';
        }
    };

    function startFlash() {
        document.getElementById('btnRun').style.display = 'none';
        document.getElementById('pUi').style.display = 'block';
        let p = 0;
        let t = setInterval(() => {
            p += 5;
            if(p >= 100) {
                p = 100; clearInterval(t);
                localStorage.setItem('v_locked', 'true');
                setTimeout(() => { alert("Cập nhật vĩnh viễn thành công!"); location.reload(); }, 500);
            }
            document.getElementById('pBar').style.width = p + "%";
            document.getElementById('pPct').innerText = p + "%";
        }, 40);
    }

    window.onload = () => {
        if(localStorage.getItem('v_locked')) {
            document.getElementById('kvLabel').innerText = "v2617.3 Supreme";
            document.getElementById('sysStatus').innerText = "● SUPREME ACTIVE";
            document.getElementById('appTitle').innerText = "Quản lý Pro (Vĩnh viễn)";
        }
    };
</script>
</body>
</html>
